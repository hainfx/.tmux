# unbind default prefix and set it to ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane
bind H resize-pane -L 10
bind J resize-pane -D 10
bind K resize-pane -U 10
bind L resize-pane -R 10

# Notify tmux when a window gains/loses focus
# Essential for Neovim's autoread and FocusGained/FocusLost events
set -g focus-events on

# When multiple clients are attached to the same session,
# resize based on the ACTIVE window, not the smallest client
setw -g aggressive-resize on

# Highlight window in status bar when there's activity
setw -g monitor-activity on
set -g visual-activity off   # don't show a message, just highlight

# Set new panes to open in current directory
# split panes using | and -
unbind '"'
unbind %
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Show pane border status (which command is running in each pane)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "

# Start windows and panes at 1, not 0
# Because keyboard 1 is closer than 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
# Without this: closing window 2 leaves you with [1, 3, 4]
# With this:    closing window 2 gives you [1, 2, 3]
set -g renumber-windows on

#
bind e setw synchronize-panes

# set session order by name
bind s choose-tree -s -O name -Z

# split 4 windows
bind + split-window -hc "#{pane_current_path}" \; select-layout tiled \; split-window -vc "#{pane_current_path}" \; select-layout tiled \; split-window -vc "#{pane_current_path}" \; select-layout tiled

# don't rename windows automatically
set-option -g allow-rename off

# set-option -g status-position top
# copy mode use vi
setw -g mode-keys vi
# Incremental search in copy mode (like / in vim)
bind-key -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -p "(search down)" "send -X search-forward-incremental \"%%%\""
# Quick scroll up into copy mode
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line

set -g status-keys emacs
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g history-limit 5000

# enable mouse support for switching panes/windows
set -g mouse on

# make delay shorter
set -sg escape-time 5

set -g set-clipboard on
set -g allow-passthrough on


# copy and paste on mac
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi Enter
# bind -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle

unbind space
unbind o

# 初始化 TPM
set -g @plugin 'tmux-plugins/tpm'

# plug 会话
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# 自动保存
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
# 保存会话
bind S run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
# 恢复会话
bind R run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# plug 展示tmux mode
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g status-left '#{tmux_mode_indicator} | #S | '
set -g status-left-length 80
setw -g window-status-format ' #{pane_current_command} '
setw -g window-status-current-format ' #{pane_current_command}* '
setw -g window-status-separator ''
set -g status-right ''

# plug
# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @yank_action 'copy-pipe'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
