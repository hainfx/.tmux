# ============================================================================
# Prefix key
# ============================================================================

# Unbind default prefix and set it to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ============================================================================
# Panes
# ============================================================================

# Navigate panes with vim-style hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with shifted hjkl (repeatable: hold prefix once and tap)
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Split panes using | and -, opening in the current pane's working directory
unbind '"'
unbind %
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

# Split the current window into a 4-pane tiled layout
bind + split-window -hc "#{pane_current_path}" \;\
       select-layout tiled \;\
       split-window -vc "#{pane_current_path}" \;\
       select-layout tiled \;\
       split-window -vc "#{pane_current_path}" \;\
       select-layout tiled

# Toggle synchronize-panes (send input to all panes simultaneously)
bind e setw synchronize-panes

# Free up default prefix keys (space cycles layouts, o rotates panes)
unbind space
unbind o

# Show pane border status (which command is running in each pane)
# set -g pane-border-status top
# set -g pane-border-format " #{pane_index}: #{pane_current_command} "


# ============================================================================
# Windows
# ============================================================================

# Open new windows in the current pane's working directory
bind c new-window -c "#{pane_current_path}"

# Don't rename windows automatically
set-option -g allow-rename off

# Start windows and panes at 1, not 0 (keyboard 1 is closer than 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
# Without this: closing window 2 leaves you with [1, 3, 4]
# With this:    closing window 2 gives you [1, 2, 3]
set -g renumber-windows on

# When multiple clients are attached to the same session,
# resize based on the ACTIVE window, not the smallest client
setw -g aggressive-resize on

# Highlight windows on activity, but don't show a visual message
setw -g monitor-activity on
set -g visual-activity off


# ============================================================================
# Sessions
# ============================================================================

# Choose session, sorted by name
bind s choose-tree -s -O name -Z

# Reload tmux config without restarting the server
bind r source-file ~/.tmux.conf \; display "Config reloaded!"


# ============================================================================
# Terminal & input
# ============================================================================

# Notify tmux when a window gains/loses focus
# Essential for Neovim's autoread and FocusGained/FocusLost events
set -g focus-events on

# Terminal: emacs status keys, true-color + tmux terminfo, cursor shape, larger scrollback
set -g status-keys emacs
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g history-limit 10000

# Enable mouse support for switching panes/windows
set -g mouse on

# Reduce escape delay so key sequences feel more responsive
set -sg escape-time 5

# Clipboard integration and extended keys (CSI u) for modern terminals
set -g set-clipboard on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'


# ============================================================================
# Copy mode
# ============================================================================

# Use vi keybindings in copy mode
setw -g mode-keys vi

# Incremental search forward (/) and backward (?), like in vim
bind -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -p "(search up)"   "send -X search-backward-incremental \"%%%\""

# Jump to start/end of line
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Mouse wheel scrolls one line at a time
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Copy and paste — uses pbcopy on macOS, xclip on Linux (set-clipboard also enables OSC 52)
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi Enter
if-shell 'uname | grep -q Darwin' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"' \
  'bind -T copy-mode-vi y send-keys -X copy-pipe "xclip -selection clipboard -in"'
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle


# ============================================================================
# Status bar
# ============================================================================

# set-option -g status-position top

# Layout: mode indicator | session name | window list (index:current command)
# NOTE: #{tmux_mode_indicator} requires the tmux-mode-indicator plugin (see Plugins)
set -g status-left '#{tmux_mode_indicator} | #S | #I | '
set -g status-left-length 80
setw -g window-status-format ' #{pane_current_command} '
setw -g window-status-current-format ' #{pane_current_command}* '
setw -g window-status-separator ''
set -g status-right ''


# ============================================================================
# Plugins (managed by TPM)
# ============================================================================

# TPM itself (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# Session persistence: tmux-resurrect saves/restores, tmux-continuum automates it
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
# Manual save / restore session bindings
bind S run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind R run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# Display the current tmux mode in the status bar
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @yank_action 'copy-pipe'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
